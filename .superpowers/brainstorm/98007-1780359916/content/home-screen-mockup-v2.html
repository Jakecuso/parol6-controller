<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAROL6 Controller — Home Screen Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .phone-frame {
    width: 390px;
    background: #000;
    border-radius: 50px;
    border: 8px solid #2a2a2a;
    box-shadow:
      0 0 0 1px #111,
      0 40px 80px rgba(0,0,0,0.8),
      inset 0 0 0 1px #333;
    overflow: hidden;
    position: relative;
  }

  .notch {
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 0 0 22px 22px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 28px 0;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    margin-top: -34px;
    position: relative;
    z-index: 5;
  }

  .status-icons {
    display: flex;
    gap: 5px;
    align-items: center;
    font-size: 11px;
  }

  .screen {
    padding: 20px 0 40px;
    min-height: 600px;
    background: radial-gradient(ellipse at 50% 0%, #0d1a2e 0%, #000 60%);
    position: relative;
  }

  .screen-title {
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px 16px;
    padding: 0 28px;
    max-width: 340px;
    margin: 0 auto;
  }

  .app-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
  }

  .app-icon {
    width: 76px;
    height: 76px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.12s ease;
    position: relative;
    overflow: hidden;
  }

  .app-icon::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
    border-radius: 18px 18px 0 0;
  }

  .app-icon:hover { transform: scale(1.08); }

  .app-label {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.2px;
  }

  .icon-manual   { background: linear-gradient(145deg, #2196f3, #0d47a1); }
  .icon-remote   { background: linear-gradient(145deg, #ff7043, #bf360c); }
  .icon-telem    { background: linear-gradient(145deg, #ab47bc, #4a148c); }
  .icon-sequence { background: linear-gradient(145deg, #ffb300, #e65100); }
  .icon-poses    { background: linear-gradient(145deg, #26c6da, #006064); }

  .status-pill {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
  }

  .dot-green { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 6px #4caf50; }

  .home-indicator {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    margin: 16px auto 8px;
  }

  .caption {
    text-align: center;
    color: #555;
    font-size: 12px;
    margin-top: 20px;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="notch"></div>
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>▮▮▮</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>
  <div class="screen">
    <div class="screen-title">PAROL6 Controller</div>

    <div class="app-grid">
      <div class="app-tile">
        <div class="app-icon icon-manual">🎮</div>
        <div class="app-label">Manual</div>
      </div>
      <div class="app-tile">
        <div class="app-icon icon-remote">🕹️</div>
        <div class="app-label">Remote</div>
      </div>
      <div class="app-tile">
        <div class="app-icon icon-telem">📊</div>
        <div class="app-label">Telemetry</div>
      </div>
      <div class="app-tile">
        <div class="app-icon icon-sequence">⏺</div>
        <div class="app-label">Sequences</div>
      </div>
      <div class="app-tile">
        <div class="app-icon icon-poses">📍</div>
        <div class="app-label">Poses</div>
      </div>
    </div>

    <div class="status-pill">
      <div class="dot-green"></div>
      Simulator · PAROL6 ready
    </div>
  </div>
  <div class="home-indicator"></div>
</div>

<p class="caption">PAROL6 Controller · 5 apps · iOS dark</p>

</body>
</html>
