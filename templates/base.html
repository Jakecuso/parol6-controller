<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PAROL6{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">
  {% block nav %}
  <div class="nav-bar">
    {% block nav_left %}<span></span>{% endblock %}
    <span class="nav-title">{% block nav_title %}PAROL6{% endblock %}</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div id="estop-pill" style="
          display:none; align-items:center; gap:5px;
          background:var(--danger); color:#fff;
          border-radius:8px; padding:5px 10px;
          font-size:11px; font-weight:800; letter-spacing:0.5px;
          animation: estop-pulse 0.7s ease-in-out infinite alternate;">
        ⚠ E-STOP
      </div>
      <button class="btn-stop" onclick="sendStop()">&#9632; STOP</button>
    </div>
  </div>
  {% endblock %}

  <main style="flex:1; padding: 16px 20px;">
    {% block content %}{% endblock %}
  </main>
</div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/static/socket.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
